<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuppVerse BD — Local Stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F7FB; --surface:#ffffff; --surface2:#F8FAFD;
  --border:rgba(10,22,40,0.07); --border-strong:rgba(10,22,40,0.10);
  --text:#0B1220; --text2:#5E6B7D; --text3:#9AA3B2;
  --accent:#0A9BDC; --accent-soft:rgba(10,155,220,0.08); --accent-glow:rgba(10,155,220,0.18);
  --orange:#F26430; --orange-soft:rgba(242,100,48,0.10);
  --green:#0A9B72; --green-soft:rgba(10,155,114,0.10);
  --red:#E14343; --red-soft:rgba(225,67,67,0.10);
  --yellow:#E5A020; --yellow-soft:rgba(229,160,32,0.10);
  --purple:#7C6FF7; --purple-soft:rgba(124,111,247,0.10);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
  --shadow-md:0 4px 14px rgba(0,0,0,0.06),0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.08),0 4px 8px rgba(0,0,0,0.04);
  --radius:18px; --radius-sm:12px; --radius-xs:8px;
  --font-body:'DM Sans',sans-serif; --font-display:'Plus Jakarta Sans',sans-serif;
  --ease:cubic-bezier(0.4,0,0.2,1);
  --header-h:56px; --bottom-nav-h:64px;
}
body.dark-mode{
  --bg:#0B0F18; --surface:#141B2A; --surface2:#1A2235;
  --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.10);
  --text:#F0F4FA; --text2:#A0AAB8; --text3:#6B7585;
  --accent:#2DBEF5; --accent-soft:rgba(45,190,245,0.08); --accent-glow:rgba(45,190,245,0.22);
  --shadow-sm:0 1px 3px rgba(0,0,0,0.20),0 1px 2px rgba(0,0,0,0.12);
  --shadow-md:0 4px 14px rgba(0,0,0,0.25),0 2px 4px rgba(0,0,0,0.15);
  --shadow-lg:0 12px 32px rgba(0,0,0,0.35),0 4px 8px rgba(0,0,0,0.20);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100dvh;padding-bottom:var(--bottom-nav-h);
  transition:background 0.3s,color 0.3s;
}

/* ─── HEADER ─── */
.s-header{
  position:sticky;top:0;z-index:50;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px) saturate(1.2);
  height:var(--header-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.s-header h1{
  font-family:var(--font-display);font-size:16px;font-weight:800;
  letter-spacing:-0.3px;
}
.s-header span{
  font-size:10px;font-weight:600;color:var(--text3);
  display:block;margin-top:-2px;
}
.s-header-actions{
  display:flex;align-items:center;gap:12px;
}
.s-header-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--text);cursor:pointer;
  position:relative;
}
.s-cart-dot{
  position:absolute;top:6px;right:6px;
  width:8px;height:8px;border-radius:50%;
  background:var(--red);border:2px solid var(--surface);
}

/* ─── SEARCH BAR ─── */
.s-search-wrap{
  padding:12px 16px 8px;
}
.s-search-row{
  display:flex;align-items:center;gap:8px;
}
.s-search-input-wrap{
  flex:1;min-width:0;height:44px;
  position:relative;z-index:44;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:10px;
  padding:0 12px 0 14px;
  box-shadow:var(--shadow-sm);
  transition:border-color 0.2s var(--ease),box-shadow 0.2s var(--ease);
}
.s-search-input-wrap:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow),var(--shadow-sm);
}
.s-search-input-wrap svg{
  width:18px;height:18px;opacity:0.5;
  color:var(--text3);flex-shrink:0;
}
.s-search-input-wrap input{
  flex:1;min-width:0;height:100%;
  border:none;background:transparent;
  font-family:var(--font-body);font-size:13px;font-weight:500;
  color:var(--text);outline:none;
}
.s-search-input-wrap input::placeholder{
  color:var(--text3);
}
.s-search-clear{
  width:24px;height:24px;border-radius:6px;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);cursor:pointer;opacity:0;
  transition:opacity 0.2s,background 0.2s;
  flex-shrink:0;padding:0;
}
.s-search-clear.show{opacity:1}
.s-search-clear:active{background:var(--surface2)}
.s-search-clear svg{width:14px;height:14px}

/* ─── SEARCH SUGGESTIONS (scoped to active store) ─── */
.s-suggest{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);box-shadow:var(--shadow-lg);
  overflow:hidden;
  opacity:0;pointer-events:none;transform:translateY(-4px);
  transition:opacity 0.18s ease,transform 0.18s ease;
}
.s-suggest.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.s-suggest-list{
  padding:6px;max-height:288px;overflow-y:auto;scrollbar-width:none;
}
.s-suggest-list::-webkit-scrollbar{display:none}
.s-suggest-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:10px;cursor:pointer;
  transition:background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.s-suggest-row:active,.s-suggest-row.hover{background:var(--accent-soft)}
.s-suggest-row > svg{width:15px;height:15px;color:var(--text3);flex-shrink:0}
.s-suggest-name{
  flex:1;min-width:0;
  font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.s-suggest-name b{color:var(--accent);font-weight:800}
.s-suggest-price{
  font-family:var(--font-display);font-size:12px;font-weight:700;
  color:var(--text3);flex-shrink:0;
}
.s-suggest-empty{
  padding:16px 14px;text-align:center;
  font-size:12px;font-weight:600;color:var(--text3);
}


/* ─── Category Badge Icons ─── */
.cat-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
}
.cat-badge svg{width:18px;height:18px;color:#fff}
.cat-badge svg use{color:#fff;fill:currentColor}
.cat-badge.cat-supplement  {background:linear-gradient(135deg,#009b72,#00704f)}
.cat-badge.cat-electronics {background:linear-gradient(135deg,#0EA5E9,#0284C7)}
.cat-badge.cat-cosmetic    {background:linear-gradient(135deg,#EC4899,#DB2777)}
.cat-badge.cat-clothing    {background:linear-gradient(135deg,#6761a8,#4a4480)}
.cat-badge.cat-general     {background:linear-gradient(135deg,#64748B,#475569)}

/* ─── TYPE SELECT BADGE ─── */
.s-type-select{
  position:relative;z-index:45;
  height:44px;min-width:72px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);
  display:flex;align-items:center;gap:6px;
  padding:0 10px 0 9px;
  box-shadow:var(--shadow-sm);
  cursor:pointer;user-select:none;
  transition:border-color 0.2s var(--ease),box-shadow 0.2s var(--ease);
  flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.s-type-select:active{opacity:0.8}
.s-type-select.open{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow),var(--shadow-sm);
}
.s-type-badge{
  display:flex;align-items:center;justify-content:center;
}
.s-type-badge .cat-badge{
  width:36px;height:36px;border-radius:10px;
}
.s-type-badge .cat-badge svg{
  width:20px;height:20px;
}
.s-type-chevron{
  color:var(--text3);flex-shrink:0;
  margin-top:1px;
}

.s-type-dropdown{
  position:absolute;top:calc(100% + 8px);right:0;z-index:40;
  width:210px;
  background:var(--surface);border:1px solid var(--border-strong);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:0;
  opacity:0;pointer-events:none;
  transform:translateY(-4px);
  transition:opacity 0.2s ease,transform 0.2s ease;
  overflow:hidden;
}
.s-type-select.open .s-type-dropdown{
  opacity:1;pointer-events:auto;
  transform:translateY(0);
}
.s-type-header{
  display:flex;align-items:center;gap:10px;
  padding:14px 16px 10px;
  border-bottom:1px solid var(--border);
}
.s-type-header svg{
  width:18px;height:18px;
  color:var(--accent);
}
.s-type-header span:nth-of-type(1){
  font-family:var(--font-display);font-size:14px;font-weight:800;
  color:var(--accent);flex:1;
}
.s-type-header-count{
  font-family:var(--font-display);font-size:14px;font-weight:700;
  color:var(--text);
}
.s-type-list{
  padding:6px;
}
.s-type-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 8px;border-radius:10px;
  cursor:pointer;
  transition:background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.s-type-row:active{background:var(--surface2)}
.s-type-row.active{background:var(--accent-soft)}
.s-type-row-name{
  flex:1;
  font-family:var(--font-body);font-size:13px;font-weight:700;
  color:var(--text);
}
.s-type-row-count{
  font-family:var(--font-display);font-size:13px;font-weight:700;
  color:var(--text);
}

/* ─── CATEGORY TABS ─── */
.s-tabs{
  display:flex;gap:8px;
  padding:8px 16px 4px;
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.s-tabs::-webkit-scrollbar{display:none}


/* ─── SECTION TITLE ─── */
.s-section{
  padding:16px 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
}
.s-section h2{
  font-family:var(--font-display);font-size:15px;font-weight:800;
}
.s-section a{
  font-size:12px;font-weight:700;color:var(--accent);text-decoration:none;
}

/* ─── PRODUCT GRID ─── */
.s-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:0 12px 24px;
}

/* ─── THE CARD ─── */
.p-card{
  width:100%;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  position:relative;
  animation:cardIn 0.5s var(--ease) forwards;
}
.p-card:active{transform:scale(0.98)}
.p-img-wrap{
  aspect-ratio:1/1;
  background:linear-gradient(135deg,var(--accent-soft),var(--bg));
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.p-img-wrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 35% 25%,rgba(255,255,255,0.35) 0%,transparent 55%);
  opacity:0.6;
}
.p-img-wrap svg{
  width:40px;height:40px;
  color:var(--text3);opacity:0.25;
  position:relative;z-index:1;
}
.p-badge-stock{
  position:absolute;top:10px;left:10px;
  font-family:var(--font-display);font-size:8px;font-weight:800;
  padding:4px 7px;border-radius:7px;z-index:3;
  backdrop-filter:blur(10px) saturate(1.2);
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.p-badge-stock.in{background:var(--green-soft);color:var(--green)}
.p-badge-stock.low{background:var(--yellow-soft);color:var(--yellow)}
.p-badge-stock.out{background:rgba(225,67,67,0.18);color:var(--red)}
.p-badge-ribbon{
  position:absolute;top:10px;right:10px;
  background:linear-gradient(135deg,var(--orange),#D94E20);
  color:#fff;font-family:var(--font-display);font-size:7px;font-weight:800;
  padding:3px 8px;border-radius:6px;z-index:3;
  text-transform:uppercase;letter-spacing:0.6px;
  box-shadow:0 3px 10px rgba(242,100,48,0.35);
}
.p-body{padding:2px 12px 10px}
.p-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:3px;
}
.p-cat{
  font-size:8.5px;font-weight:800;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.04em;
  margin-top:3px;
}
.p-rating{
  display:flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;color:var(--yellow);
}
.p-stars{
  display:flex;align-items:center;gap:1.5px;
}
.p-stars svg{
  width:11px;height:11px;
  color:var(--yellow);
}
.p-name{
  font-family:var(--font-display);font-size:12px;font-weight:700;
  color:var(--text);line-height:1.35;margin-bottom:2px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  min-height:32px;
}
.p-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:2px;margin-top:0;
}
.p-price-block{
  display:flex;flex-direction:column;gap:1px;
  margin-top:2px;
}
.p-price{
  font-family:var(--font-display);font-size:15px;font-weight:800;
  color:#1B2A4A;line-height:1;
}
body.dark-mode .p-price{color:#ffffff;}
.p-price span{
  font-size:9px;color:var(--text3);font-weight:600;margin-left:2px;
}
.p-discount-inline{
  display:inline-flex;align-items:center;gap:2px;
  background:#D1FAE5;color:#059669 !important;
  font-family:var(--font-display);font-size:6.5px;font-weight:800;
  padding:1px 4px;border-radius:3px;margin-left:5px;
  border:1px solid #10B981;
  text-transform:uppercase;letter-spacing:0.25px;
  vertical-align:2px;
  line-height:1;
}
body.dark-mode .p-discount-inline{background:rgba(5,150,105,0.20);color:#34D399 !important;border-color:#059669;}
.p-old-price{
  font-size:12px;font-weight:600;color:var(--text2);
  text-decoration:none;
  position:relative;
  display:inline-block;
  align-self:flex-start;
}
.p-old-price::after{
  content:'';
  position:absolute;left:0px;right:-2px;
  top:0;bottom:0;height:1.5px;margin:auto;
  background:rgba(225,67,67,0.90);
  border-radius:1px;
  transform:rotate(-8deg);
  transform-origin:center;
}
.p-actions{
  display:flex;align-items:center;gap:6px;
}
.p-add{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(145deg,var(--accent),#0077B3);
  display:flex;align-items:center;justify-content:center;
  color:#fff;border:none;cursor:pointer;
  box-shadow:0 3px 10px var(--accent-glow);
  transition:all 0.25s var(--ease);
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.p-add::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.22),transparent);
  opacity:0;transition:opacity 0.2s;
}
.p-add:active{transform:scale(0.86)}
.p-add:active::after{opacity:1}
.p-add.added{
  background:var(--green);
  box-shadow:0 3px 10px rgba(10,155,114,0.28);
}
.p-add svg{margin-left:-2px;margin-top:1px}
.p-buy{
  height:32px;padding:0 12px;border-radius:9px;
  background:linear-gradient(145deg,var(--green),#088a5e);
  display:flex;align-items:center;justify-content:center;
  color:#fff;border:none;cursor:pointer;
  font-family:var(--font-display);font-size:10px;font-weight:800;
  letter-spacing:0.3px;text-transform:uppercase;
  box-shadow:0 3px 10px rgba(10,155,114,0.22);
  transition:all 0.25s var(--ease);
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.p-buy::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.18),transparent);
  opacity:0;transition:opacity 0.2s;
}
.p-buy:active{transform:scale(0.94)}

/* Out-of-stock card: mute image + text, NOT the bar or wishlist button */
.p-card-out .p-img-wrap{
  background:linear-gradient(135deg,#d8dde4,#c5cdd8) !important;
}
body.dark-mode .p-card-out .p-img-wrap{
  background:linear-gradient(135deg,#141c2e,#0a101e) !important;
}
.p-card-out .p-img-wrap svg{
  filter:grayscale(0.65) brightness(0.92);
  opacity:0.55;
}
.p-card-out .p-img-wrap::before{
  opacity:0.3;
}
.p-card-out .p-meta,
.p-card-out .p-name,
.p-card-out .p-price-block{
  filter:grayscale(0.65) brightness(0.92);
  opacity:0.55;
}
.p-out-bar{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(225,67,67,0.92);
  color:#fff;
  font-family:var(--font-display);
  font-size:9px;
  font-weight:800;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:5px 14px;
  border-radius:4px;
  white-space:nowrap;
  z-index:3;
  box-shadow:0 2px 8px rgba(225,67,67,0.35);
}
.p-wish{
  height:32px;
  padding:0 12px;
  border-radius:9px;
  background:var(--surface);
  border:1.5px solid var(--red);
  color:var(--red);
  font-family:var(--font-display);
  font-size:10px;
  font-weight:800;
  letter-spacing:0.2px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  cursor:pointer;
  transition:all 0.2s var(--ease);
  width:100%;
}
.p-wish:active{transform:scale(0.94);background:var(--red-soft)}
.p-buy:active::after{opacity:1}

/* ─── BOTTOM NAV ─── */
.s-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  height:var(--bottom-nav-h);
  background:var(--surface);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px) saturate(1.2);
  display:flex;align-items:center;justify-content:space-around;
  padding:0 8px 8px;
}
.s-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--text3);font-size:10px;font-weight:600;
  cursor:pointer;transition:color 0.2s;
  padding:6px 12px;border-radius:10px;
}
.s-nav-item.active{color:var(--accent)}
.s-nav-item svg{width:22px;height:22px}

/* ─── TRENDING HORIZONTAL (FRESH) ─── */
.trending-wrapper{
  padding:0 12px 4px;
  position:relative;
}
.trending-scroll{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.trending-scroll::-webkit-scrollbar{display:none}

.trending-item{
  flex:0 0 260px;
  scroll-snap-align:start;
  background:var(--surface);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  overflow:hidden;
  box-shadow:var(--shadow-sm);
  display:flex;
  align-items:stretch;
  gap:8px;
  padding:10px;
  cursor:pointer;
  position:relative;
}

.trending-pic{
  width:88px;
  min-width:88px;
  height:88px;
  min-height:88px;
  aspect-ratio:1/1;
  border-radius:10px;
  background:linear-gradient(135deg,var(--accent-soft),var(--bg));
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04);
  align-self:flex-start;
}
.trending-pic::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 35% 25%,rgba(255,255,255,0.35) 0%,transparent 55%);
  opacity:0.6;
}
.trending-pic svg{
  width:26px;
  height:26px;
  color:var(--text3);
  opacity:0.25;
  position:relative;
  z-index:1;
}

.trending-meta{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  gap:1px;
  min-width:0;
  padding-top:2px;
}
.trending-tag{
  font-size:8px;
  font-weight:800;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.trending-title{
  font-family:var(--font-display);
  font-size:12px;
  font-weight:700;
  color:var(--text);
  line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  min-height:28px;
}
.trending-prices{
  display:flex;
  align-items:center;
  gap:6px;
  margin-top:0;
}
.trending-new{
  font-family:var(--font-display);
  font-size:14px;
  font-weight:800;
  color:var(--text);
  line-height:1;
  flex-shrink:0;
}
.trending-old{
  font-size:10px;
  font-weight:600;
  color:var(--red);
  text-decoration:line-through;
  flex-shrink:0;
  margin-top:2px;
}
.trending-off{
  display:inline-flex;
  align-items:center;
  background:var(--green-soft);
  color:var(--green);
  font-family:var(--font-display);
  font-size:6.5px;
  font-weight:800;
  padding:1px 4px;
  border-radius:3px;
  border:1px solid var(--green);
  text-transform:uppercase;
  letter-spacing:0.2px;
  flex-shrink:0;
  margin-top:2px;
  box-shadow:0 0 6px rgba(10,155,114,0.25),0 0 12px rgba(10,155,114,0.12);
}
body.dark-mode .trending-off{
  background:rgba(10,155,114,0.15);
  color:#34D399;
  border-color:#059669;
}
.trending-link{
  position:absolute;
  bottom:10px;
  right:10px;
  display:inline-flex;
  align-items:center;
  gap:3px;
  font-family:var(--font-display);
  font-size:10px;
  font-weight:800;
  color:var(--orange);
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  letter-spacing:0.2px;
}
.trending-link svg{
  width:12px;
  height:12px;
  transition:transform 0.2s var(--ease);
}
.trending-link:hover svg{transform:translateX(2px)}

/* ─── MINI TYPE ICON BADGE ON TRENDING CARD ─── */
.trending-type-icon{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:22px;
  height:22px;
  border-radius:6px;
  flex-shrink:0;
  margin-top:auto;
  margin-bottom:1px;
  overflow:hidden;
}
.trending-type-icon svg{
  width:12px !important;
  height:12px !important;
  color:#fff;
  display:block;
}
.trending-type-icon.type-supplement  {background:linear-gradient(135deg,#009b72,#00704f);}
.trending-type-icon.type-electronics {background:linear-gradient(135deg,#0EA5E9,#0284C7);}
.trending-type-icon.type-cosmetic    {background:linear-gradient(135deg,#EC4899,#DB2777);}
.trending-type-icon.type-clothing    {background:linear-gradient(135deg,#6761a8,#4a4480);}
.trending-type-icon.type-general     {background:linear-gradient(135deg,#64748B,#475569);}


/* ─── AUTO-SLIDE DROP HINT ─── */
.trending-hint{
  position:absolute;
  top:-10px;
  right:12px;
  z-index:5;
  display:flex;
  align-items:center;
  gap:4px;
  font-family:var(--font-display);
  font-size:9px;
  font-weight:800;
  color:var(--accent);
  background:var(--surface);
  border:1px solid var(--border-strong);
  padding:5px 10px;
  border-radius:20px;
  box-shadow:var(--shadow-md);
  opacity:0;
  transform:translateY(-12px);
  pointer-events:none;
  transition:opacity 0.4s var(--ease), transform 0.4s var(--ease);
}
.trending-hint.show{
  opacity:1;
  transform:translateY(0);
}
.trending-hint svg{
  width:12px;height:12px;
  animation:hintBounce 1.2s ease-in-out infinite;
}
@keyframes hintBounce{
  0%,100%{transform:translateX(0)}
  50%{transform:translateX(4px)}
}

/* ─── CATEGORY PILLS (SLIDING INDICATOR) ─── */
.ui-control{position:absolute;opacity:0;pointer-events:none}

.s-tabs-wrap{
  padding:10px 14px 12px;
  position:relative;z-index:10;
}
.s-tabs-scroll{
  overflow-x:auto;scrollbar-width:none;
}
.s-tabs-scroll::-webkit-scrollbar{display:none}
.s-tabs-track{
  position:relative;display:inline-flex;gap:6px;padding:4px;
  border-radius:12px;min-width:100%;
  background:rgba(0,0,0,0.03);
  border:1px solid rgba(0,0,0,0.05);
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.07),
    inset 0 1px 1px rgba(0,0,0,0.04),
    inset 0 -1px 1px rgba(255,255,255,0.7),
    0 1px 0 rgba(255,255,255,0.5);
}
body.dark-mode .s-tabs-track{
  background:rgba(0,0,0,0.28);
  border-color:rgba(255,255,255,0.03);
  box-shadow:
    inset 0 1px 4px rgba(0,0,0,0.4),
    inset 0 1px 2px rgba(0,0,0,0.25),
    inset 0 -1px 1px rgba(255,255,255,0.02),
    0 1px 0 rgba(255,255,255,0.03);
}

.s-tab-indicator{
  position:absolute;top:4px;left:0;height:calc(100% - 8px);
  border-radius:10px;pointer-events:none;
  background:linear-gradient(180deg,#1f3d5e 0%,#001f3c 55%,#001426 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.20),
    inset 0 -1px 0 rgba(0,0,0,0.35),
    inset 1px 0 0 rgba(255,255,255,0.07),
    inset -1px 0 0 rgba(255,255,255,0.07),
    0 3px 10px rgba(0,31,60,0.45),
    0 1px 3px rgba(0,0,0,0.25),
    0 0 0 0.5px rgba(0,0,0,0.18);
  transition:
    transform 0.55s cubic-bezier(0.4,0,0.2,1),
    width 0.55s cubic-bezier(0.4,0,0.2,1),
    background 0.3s ease, box-shadow 0.3s ease;
  will-change:transform,width;
}
.s-tab-indicator::after{
  content:'';position:absolute;top:2px;left:10%;right:10%;height:42%;
  border-radius:999px;
  background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 100%);
  pointer-events:none;
}
body.dark-mode .s-tab-indicator{
  background:linear-gradient(180deg,#8591ff 0%,#6f7cff 50%,#5560ef 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.35),
    inset 0 -1px 0 rgba(0,0,0,0.35),
    inset 1px 0 0 rgba(255,255,255,0.1),
    inset -1px 0 0 rgba(255,255,255,0.1),
    0 0 14px rgba(111,124,255,0.55),
    0 4px 16px rgba(111,124,255,0.40),
    0 2px 4px rgba(0,0,0,0.4),
    0 0 0 0.5px rgba(111,124,255,0.6);
}
body.dark-mode .s-tab-indicator::after{
  background:linear-gradient(180deg,rgba(255,255,255,0.28) 0%,rgba(255,255,255,0) 100%);
}

.s-tab{
  position:relative;z-index:1;
  background:linear-gradient(180deg,rgba(255,255,255,0.90) 0%,rgba(255,255,255,0.68) 45%,rgba(220,228,242,0.60) 100%);
  border:1px solid rgba(255,255,255,0.88);
  border-bottom-color:rgba(0,0,0,0.07);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    inset 0 -1px 0 rgba(0,0,0,0.05),
    0 1px 3px rgba(0,0,0,0.07),
    0 0 0 0.5px rgba(0,0,0,0.03);
  color:#6b6c5e;
  font-family:var(--font-display);font-size:11px;font-weight:700;
  padding:8px 16px;border-radius:10px;white-space:nowrap;cursor:pointer;
  transition:color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
  user-select:none;touch-action:manipulation;outline:none;
  -webkit-tap-highlight-color:transparent;
  text-align:center;
}
body.dark-mode .s-tab{
  background:linear-gradient(180deg,rgba(255,255,255,0.09) 0%,rgba(255,255,255,0.04) 50%,rgba(255,255,255,0.02) 100%);
  border-color:rgba(255,255,255,0.1);
  border-bottom-color:rgba(0,0,0,0.2);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.18),
    0 1px 2px rgba(0,0,0,0.25);
  color:#c2ccda;
}
.s-tab-option:checked + .s-tab{
  color:#ffffff;background:transparent;border-color:transparent;box-shadow:none;
}

/* ─── EMPTY STATE + STORE TABS VISIBILITY ─── */
.s-empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  padding:44px 24px;text-align:center;color:var(--text3);
  animation:cardIn 0.4s var(--ease) both;
}
.s-empty svg{width:40px;height:40px;opacity:0.35}
.s-empty strong{
  font-family:var(--font-display);font-size:14px;font-weight:800;
  color:var(--text2);
}
.s-empty span{font-size:12px;font-weight:500}
.s-tabs-wrap.is-hidden{display:none}

/* ─── Animation ─── */
@keyframes cardIn{
  from{opacity:0;transform:translateY(16px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ─── Heart bounce animation ─── */
@keyframes heartBounce{
  0%   {transform:scale(1)}
  25%  {transform:scale(1.35)}
  50%  {transform:scale(0.85)}
  75%  {transform:scale(1.12)}
  100% {transform:scale(1)}
}
.p-wish .heart-icon{
  transition:fill 0.25s ease, stroke 0.25s ease, transform 0.3s var(--ease);
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.p-wish .heart-icon{
  fill:none;
  stroke:currentColor;
}
.p-wish .heart-icon.filled{
  fill:var(--red);
  stroke:none;
}
.p-wish .heart-icon.bounce{
  animation:heartBounce 0.4s var(--ease) forwards;
  transform-origin:center;
}

/* ─── Toast Notification ─── */
.s-toast{
  position:fixed;
  left:50%;bottom:calc(var(--bottom-nav-h) + 16px);
  transform:translateX(-50%) translateY(20px);
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border-strong);
  box-shadow:var(--shadow-lg);
  border-radius:var(--radius-sm);
  padding:12px 20px;
  font-family:var(--font-body);
  font-size:13px;
  font-weight:600;
  display:flex;align-items:center;gap:10px;
  opacity:0;pointer-events:none;
  transition:opacity 0.35s var(--ease), transform 0.35s var(--ease);
  z-index:100;
  white-space:nowrap;
}
.s-toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
  pointer-events:auto;
}
.s-toast svg{
  width:18px;height:18px;
  color:var(--red);
  flex-shrink:0;
}

/* ─── Grid sort animations ─── */
.p-card.sort-out{
  animation:sortOut 0.35s var(--ease) forwards;
}
.p-card.sort-in{
  animation:sortIn 0.45s var(--ease) forwards;
}
@keyframes sortOut{
  from{opacity:1;transform:scale(1) translateY(0)}
  to{opacity:0;transform:scale(0.88) translateY(12px)}
}
@keyframes sortIn{
  from{opacity:0;transform:scale(0.92) translateY(18px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}
</style>

  {name:'Optimum Nutrition Gold Standard 100% Whey Protein Isolate 2kg',type:'Supplement',cat:'Protein',price:4200,old:5600,discount:'20% OFF',rating:3.5,stock:'in',sale:true},
  {name:'Dymatize ISO100 Hydrolyzed Whey Protein 2.2kg',type:'Supplement',cat:'Protein',price:4800,old:6000,discount:'20% OFF',rating:4.2,stock:'in',sale:false},
  {name:'Cellucor C4 Original Pre-Workout 60 Servings',type:'Supplement',cat:'Pre-Workout',price:2200,old:2800,discount:'21% OFF',rating:4.0,stock:'low',sale:true},
  {name:'Optimum Nutrition Micronized Creatine Monohydrate 600g',type:'Supplement',cat:'Creatine',price:1500,old:1900,discount:'21% OFF',rating:4.6,stock:'in',sale:false},
  {name:'MuscleTech Nitro-Tech Whey Protein 1.8kg',type:'Supplement',cat:'Protein',price:3800,old:4500,discount:'15% OFF',rating:3.8,stock:'in',sale:true},
  {name:'NOW Foods Vitamin D3 5000 IU 120 Softgels',type:'Supplement',cat:'Vitamins',price:800,old:1000,discount:'20% OFF',rating:4.5,stock:'in',sale:false},
  {name:'EVLution Nutrition BCAA Energy 30 Servings',type:'Supplement',cat:'Pre-Workout',price:1800,old:2200,discount:'18% OFF',rating:4.1,stock:'in',sale:true},
  {name:'MusclePharm Combat Protein Powder 2.2kg',type:'Supplement',cat:'Protein',price:3500,old:4200,discount:'17% OFF',rating:3.2,stock:'out',sale:false},

  {name:'Apple AirPods Pro 2nd Gen with MagSafe Case',type:'Electronics',cat:'Audio',price:18500,old:22000,discount:'16% OFF',rating:4.7,stock:'in',sale:true},
  {name:'Anker 737 Power Bank 24,000mAh 140W',type:'Electronics',cat:'Accessories',price:7200,old:8500,discount:'15% OFF',rating:4.4,stock:'in',sale:false},
  {name:'The Ordinary Niacinamide 10% + Zinc 1% 30ml',type:'Cosmetic',cat:'Serum',price:950,old:1200,discount:'21% OFF',rating:4.3,stock:'in',sale:true},
  {name:'Nike Dri-FIT Training T-Shirt Black',type:'Clothing',cat:'Activewear',price:1800,old:2400,discount:'25% OFF',rating:4.0,stock:'in',sale:false},
  {name:'Hydro Flask 32oz Wide Mouth Water Bottle',type:'General',cat:'Lifestyle',price:3200,old:3800,discount:'16% OFF',rating:4.5,stock:'low',sale:true},

function buildStars(r){
  const full = Math.floor(r);
  const half = r % 1 >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  const star = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  const emptyStar = '<svg viewBox="0 0 24 24" fill="var(--text3)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  let h = '';
  if(half){
    const pct = Math.round((r % 1) * 100);
    h = '<svg viewBox="0 0 24 24"><defs><linearGradient id="sg'+r+'" x1="0" y1="0" x2="1" y2="0"><stop offset="'+pct+'%" stop-color="var(--yellow)"/><stop offset="'+pct+'%" stop-color="var(--text3)"/></linearGradient></defs><path fill="url(#sg'+r+')" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  }
  return star.repeat(full) + h + emptyStar.repeat(empty);
}

const cartSVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.29977 5H21L19 12H7.37671M20 16H8L6 3H3M9 20C9 20.5523 8.55228 21 8 21C7.44772 21 7 20.5523 7 20C7 19.4477 7.44772 19 8 19C8.55228 19 9 19.4477 9 20ZM20 20C20 20.5523 19.5523 21 19 21C18.4477 21 18 20.5523 18 20C18 19.4477 18.4477 19 19 19C19.5523 19 20 19.4477 20 20Z"/></svg>';

const trendingScroll = document.getElementById('trendingScroll');
const trendingHint = document.getElementById('trendingHint');

/* Curated trending mix: one from each store type */
const trendingItems = [
  products[0],   // Supplement
  products[8],   // Electronics
  products[10],  // Cosmetic
  products[11],  // Clothing
  products[12],  // General
];

const picSVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 2h8"/><path d="M9 2v6.5L4.5 15A3 3 0 0 0 7 20h10a3 3 0 0 0 2.5-5L15 8.5V2"/></svg>';

const TYPE_BADGE_META = {
  Supplement:  { cls:'type-supplement',  icon:'#cat-icon-supplement',  vb:'0 0 512 512' },
  Electronics: { cls:'type-electronics', icon:'#cat-icon-electronics', vb:'0 0 64 64' },
  Cosmetic:    { cls:'type-cosmetic',    icon:'#cat-icon-cosmetic',    vb:'0 0 512 512' },
  Clothing:    { cls:'type-clothing',    icon:'#cat-icon-clothing',    vb:'0 0 512 512' },
  General:     { cls:'type-general',     icon:'#cat-icon-general',     vb:'0 0 24 24' },
};

function renderTrending(){
  trendingScroll.innerHTML = '';
  trendingItems.forEach((p,i) => {
    const meta = TYPE_BADGE_META[p.type] || TYPE_BADGE_META.General;
    trendingScroll.innerHTML += `
      <div class="trending-item" style="animation:cardIn 0.4s var(--ease) ${i*0.08}s both">
        <div class="trending-pic">${picSVG}</div>
        <div class="trending-meta">
          <div class="trending-tag">${p.cat}</div>
          <div class="trending-title">${p.name}</div>
          <div class="trending-prices">
            <span class="trending-new">৳${p.price.toLocaleString()}</span>
            <span class="trending-old">৳${p.old.toLocaleString()}</span>
            <span class="trending-off">${p.discount}</span>
          </div>
          <div class="trending-type-icon ${meta.cls}"><svg width="12" height="12" viewBox="${meta.vb}"><use href="${meta.icon}" fill="#fff" stroke="#fff"/></svg></div>
          <button class="trending-link" onclick="event.stopPropagation();alert('Go to product detail')" aria-label="Explore product">
            Explore<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    `;
  });
}
renderTrending();

const grid = document.getElementById('grid');

function renderCard(p,i){
  var isOut = p.stock === 'out';
  var gridImg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 2h8"/><path d="M9 2v6.5L4.5 15A3 3 0 0 0 7 20h10a3 3 0 0 0 2.5-5L15 8.5V2"/></svg>';
  var stockClass = p.stock;
  var stockText = p.stock === 'in' ? 'In Stock' : p.stock === 'low' ? 'Low Stock' : 'Out';
  var saleBadge = (!isOut && p.sale) ? '<span class="p-badge-ribbon">Sale</span>' : '';
  var outBar = isOut ? '<div class="p-out-bar">OUT OF STOCK</div>' : '';
  var actions = isOut 
    ? '<div class="p-actions"><button class="p-wish" onclick="toggleWish(this)" aria-label="Add to wishlist"><svg class="heart-icon" width="16" height="16" style="margin-top:-1px" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Wishlist</button></div>'
    : '<div class="p-actions"><button class="p-add" onclick="toggleCart(this)" aria-label="Add to cart">' + cartSVG + '</button><button class="p-buy" onclick="buyNow(this)" aria-label="Buy now">Buy</button></div>';
  var stockBadge = isOut ? '' : '<span class="p-badge-stock ' + stockClass + '">' + stockText + '</span>';
  return '<div class="p-card ' + (isOut ? 'p-card-out' : '') + '" style="animation-delay:' + (i*0.06) + 's;">' +
    '<div class="p-img-wrap">' + gridImg + stockBadge + saleBadge + outBar + '</div>' +
    '<div class="p-body">' +
      '<div class="p-meta"><span class="p-cat">' + p.cat + '</span><span class="p-rating"><span class="p-stars">' + buildStars(p.rating) + '</span>' + p.rating + '</span></div>' +
      '<div class="p-name">' + p.name + '</div>' +
      '<div class="p-footer">' +
        '<div class="p-price-block">' +
          '<div class="p-price">৳' + p.price.toLocaleString() + '<span class="p-discount-inline">' + p.discount + '</span></div>' +
          '<div class="p-old-price">৳' + p.old.toLocaleString() + '</div>' +
        '</div>' + actions +
      '</div>' +
    '</div>' +
  '</div>';
}

function toggleCart(btn){
  const isAdded = btn.classList.contains('added');
  const checkIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>';
  btn.classList.toggle('added');
  btn.innerHTML = isAdded ? cartSVG : checkIcon;
}
function buyNow(btn){
  btn.style.transform='scale(0.94)';
  setTimeout(()=>btn.style.transform='',150);
}

// ─── SLIDING TAB INDICATOR ───
(function(){
  var indicator = document.getElementById('sTabIndicator');
  var track = document.getElementById('sTabsTrack');
  var scrollBox = document.querySelector('.s-tabs-scroll');
  if(!indicator || !track) return;

  var resizeTimer = null;
  var lastW = 0, lastX = 0;
  var savedScroll = 0;

  function positionTabIndicator(animate){
    var checked = document.querySelector('input[name="category"]:checked');
    if(!checked) return;
    var label = checked.nextElementSibling;
    if(!label) return;
    var trackRect = track.getBoundingClientRect();
    var labelRect = label.getBoundingClientRect();
    var w = Math.round(labelRect.width);
    var x = Math.round(labelRect.left - trackRect.left);
    if(w === lastW && x === lastX) return;
    lastW = w; lastX = x;
    if(!animate){ indicator.style.transition = 'none'; }
    indicator.style.width = w + 'px';
    indicator.style.transform = 'translate3d(' + x + 'px,0,0)';
    if(!animate){ requestAnimationFrame(function(){ indicator.style.transition = ''; }); }
  }

  requestAnimationFrame(function(){ positionTabIndicator(false); });

  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ positionTabIndicator(false); }, 100);
  });

  document.querySelectorAll('input[name="category"]').forEach(function(input){
    input.addEventListener('change', function(){
      if(scrollBox) { scrollBox.scrollLeft = savedScroll; }
      positionTabIndicator(true);
    });
  });

  var scrollTimer;
  window.addEventListener('scroll', function(){
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function(){ positionTabIndicator(false); }, 150);
  }, {passive:true});

  document.querySelectorAll('.s-tab').forEach(function(lbl){
    lbl.addEventListener('click', function(){
      if(scrollBox) savedScroll = scrollBox.scrollLeft;
    }, true);
  });
})();

function toggleWish(btn){
  var svg = btn.querySelector('.heart-icon');
  if(!svg) return;
  var isFilled = svg.classList.contains('filled');
  if(isFilled){
    svg.classList.remove('filled');
    showToast('Removed from wishlist');
  } else {
    svg.classList.add('filled','bounce');
    setTimeout(function(){ svg.classList.remove('bounce'); }, 400);
    showToast('Product added to the wishlist');
  }
}
function showToast(msg){
  var t = document.getElementById('wishToast');
  var txt = document.getElementById('wishToastText');
  if(!t || !txt) return;
  txt.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(function(){ t.classList.remove('show'); }, 2200);
}


/* ─── Store Controller: type + category + search (single render pipeline) ─── */
(function(){
  var S = { type:'Supplement', cat:'All', q:'' };
  var TYPE_META = {
    Supplement:  { cls:'cat-supplement',  icon:'#cat-icon-supplement',  vb:'0 0 512 512', hasCats:true  },
    Electronics: { cls:'cat-electronics', icon:'#cat-icon-electronics', vb:'0 0 64 64',   hasCats:false },
    Cosmetic:    { cls:'cat-cosmetic',    icon:'#cat-icon-cosmetic',    vb:'0 0 512 512', hasCats:false },
    Clothing:    { cls:'cat-clothing',    icon:'#cat-icon-clothing',    vb:'0 0 512 512', hasCats:false },
    General:     { cls:'cat-general',     icon:'#cat-icon-general',     vb:'0 0 24 24',   hasCats:false }
  };

  var searchInput  = document.getElementById('sSearchInput');
  var searchClear  = document.getElementById('sSearchClear');
  var typeSelect   = document.getElementById('sTypeSelect');
  var typeDropdown = document.getElementById('sTypeDropdown');
  var badgeInner   = document.getElementById('sTypeBadgeInner');
  var tabsWrap     = document.querySelector('.s-tabs-wrap');
  if(!searchInput || !typeSelect || !badgeInner) return;

  var totalCount = 0;
  typeDropdown.querySelectorAll('.s-type-row').forEach(function(row){
    var n = products.filter(function(p){ return p.type === row.dataset.cat; }).length;
    row.querySelector('.s-type-row-count').textContent = n;
    totalCount += n;
  });
  document.getElementById('typeHeaderCount').textContent = totalCount;

  function esc(s){ return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function emptyHTML(){
    return '<div class="s-empty">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' +
      '<strong>No products here yet</strong>' +
      '<span>' + (S.q ? 'Nothing matches &ldquo;' + esc(S.q) + '&rdquo; in ' + S.type + '.' : 'The ' + S.type + ' store is being stocked. Check back soon.') + '</span>' +
    '</div>';
  }

  function filtered(){
    var q = S.q.toLowerCase();
    return products.filter(function(p){
      return p.type === S.type &&
             (S.cat === 'All' || p.cat === S.cat) &&
             (!q || p.name.toLowerCase().indexOf(q) !== -1);
    });
  }

  function paint(list, animateIn){
    grid.innerHTML = list.length ? '' : emptyHTML();
    list.forEach(function(p,i){ grid.innerHTML += renderCard(p,i); });
    if(animateIn){
      grid.querySelectorAll('.p-card').forEach(function(c,i){
        c.style.animationDelay = (i * 0.06) + 's';
        c.classList.add('sort-in');
      });
    }
  }

  function render(animate){
    var list = filtered();
    var cards = grid.querySelectorAll('.p-card');
    if(animate !== false && cards.length){
      cards.forEach(function(c){ c.classList.add('sort-out'); });
      setTimeout(function(){ paint(list, true); }, 320);
    } else {
      paint(list, false);
    }
  }

  var searchTimer;
  searchInput.addEventListener('input', function(){
    S.q = this.value.trim();
    hoverIdx = -1;
    searchClear.classList.toggle('show', S.q.length > 0);
    renderSuggest();
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function(){ render(); }, 150);
  });
  searchClear.addEventListener('click', function(){
    searchInput.value = ''; S.q = '';
    searchClear.classList.remove('show');
    hideSuggest();
    searchInput.focus();
    render();
  });

  var suggestBox  = document.getElementById('sSuggest');
  var suggestList = document.getElementById('sSuggestList');
  var hoverIdx = -1;
  var currentMatches = [];

  function hideSuggest(){
    if(suggestBox) suggestBox.classList.remove('show');
    hoverIdx = -1;
  }

  function suggestMatches(){
    var q = S.q.toLowerCase();
    if(!q) return [];
    return products
      .filter(function(p){ return p.type === S.type && p.name.toLowerCase().indexOf(q) !== -1; })
      .sort(function(a,b){
        return a.name.toLowerCase().indexOf(q) - b.name.toLowerCase().indexOf(q);
      })
      .slice(0,6);
  }

  function highlight(name){
    var i = name.toLowerCase().indexOf(S.q.toLowerCase());
    if(i < 0) return esc(name);
    return esc(name.slice(0,i)) + '<b>' + esc(name.slice(i, i + S.q.length)) + '</b>' + esc(name.slice(i + S.q.length));
  }

  function renderSuggest(){
    if(!suggestBox || !suggestList) return;
    if(!S.q){ hideSuggest(); return; }
    currentMatches = suggestMatches();
    if(!currentMatches.length){
      var hasAny = products.some(function(p){ return p.type === S.type; });
      suggestList.innerHTML = '<div class="s-suggest-empty">' +
        (hasAny ? 'No matches in ' + S.type : 'The ' + S.type + ' store has no products yet') + '</div>';
    } else {
      suggestList.innerHTML = currentMatches.map(function(p,i){
        return '<div class="s-suggest-row" data-i="' + i + '">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>' +
          '<span class="s-suggest-name">' + highlight(p.name) + '</span>' +
          '<span class="s-suggest-price">&#2547;' + p.price.toLocaleString() + '</span>' +
        '</div>';
      }).join('');
    }
    suggestBox.classList.add('show');
  }

  function pickSuggest(row){
    var p = currentMatches[+row.dataset.i];
    if(!p) return;
    searchInput.value = p.name;
    S.q = p.name;
    searchClear.classList.add('show');
    hideSuggest();
    render();
  }

  suggestList.addEventListener('click', function(e){
    var row = e.target.closest('.s-suggest-row');
    if(row) pickSuggest(row);
  });

  searchInput.addEventListener('keydown', function(e){
    if(e.key === 'Escape'){ hideSuggest(); return; }
    var rows = suggestList.querySelectorAll('.s-suggest-row');
    if(!rows.length) return;
    if(e.key === 'ArrowDown' || e.key === 'ArrowUp'){
      e.preventDefault();
      hoverIdx += (e.key === 'ArrowDown' ? 1 : -1);
      if(hoverIdx < 0) hoverIdx = rows.length - 1;
      if(hoverIdx >= rows.length) hoverIdx = 0;
      rows.forEach(function(r,i){ r.classList.toggle('hover', i === hoverIdx); });
    } else if(e.key === 'Enter' && hoverIdx > -1){
      e.preventDefault();
      pickSuggest(rows[hoverIdx]);
    }
  });

  searchInput.addEventListener('focus', function(){ if(S.q) renderSuggest(); });

  document.querySelector('.s-search-input-wrap').addEventListener('click', function(e){
    e.stopPropagation();
  });

  typeSelect.addEventListener('click', function(e){
    e.stopPropagation();
    typeSelect.classList.toggle('open');
  });
  document.addEventListener('click', function(){
    typeSelect.classList.remove('open');
    hideSuggest();
  });

  typeDropdown.addEventListener('click', function(e){
    e.stopPropagation();
    var row = e.target.closest('.s-type-row');
    if(!row) return;
    typeDropdown.querySelectorAll('.s-type-row').forEach(function(o){ o.classList.remove('active'); });
    row.classList.add('active');
    S.type = row.dataset.cat;
    var meta = TYPE_META[S.type];
    badgeInner.className = 'cat-badge ' + meta.cls;
    var svg = badgeInner.querySelector('svg');
    svg.setAttribute('viewBox', meta.vb);
    svg.querySelector('use').setAttribute('href', meta.icon);
    searchInput.placeholder = S.type === 'Supplement' ? 'Search supplements, vitamins...' : 'Search ' + S.type.toLowerCase() + '...';
    tabsWrap.classList.toggle('is-hidden', !meta.hasCats);
    typeSelect.classList.remove('open');
    searchInput.value = ''; S.q = '';
    searchClear.classList.remove('show');
    hideSuggest();
    var allRadio = document.getElementById('cat-all');
    if(S.cat !== 'All' && allRadio){
      S.cat = 'All';
      allRadio.checked = true;
      allRadio.dispatchEvent(new Event('change',{bubbles:true}));
    } else {
      render();
    }
  });

  document.querySelectorAll('input[name="category"]').forEach(function(inp){
    inp.addEventListener('change', function(){
      var lbl = inp.nextElementSibling;
      if(lbl) S.cat = lbl.textContent.trim();
      render();
    });
  });

  render(false);
})();

/* ─── Premium Peek Animation: tease scroll right then back ─── */
(function(){
  var scroll = document.getElementById('trendingScroll');
  var hint = document.getElementById('trendingHint');
  if(!scroll) return;

  var cards = scroll.querySelectorAll('.trending-item');
  if(cards.length <= 1) return;

  var HAS_SEEN_KEY = 'svbd_trendingPeek';
  var hasSeen = localStorage.getItem(HAS_SEEN_KEY);
  if(hasSeen) return;

  function showHint(){
    if(!hint) return;
    hint.classList.add('show');
    setTimeout(function(){ hint.classList.remove('show'); }, 4000);
  }

  function peek(){
    var step = Math.round((cards[0].offsetWidth + 12) * 0.55);
    var start = scroll.scrollLeft;

    // Slide right
    scroll.scrollTo({ left: start + step, behavior: 'smooth' });

    // Slide back after 900ms
    setTimeout(function(){
      scroll.scrollTo({ left: start, behavior: 'smooth' });
    }, 900);

    // Show hint
    showHint();

    // Mark as seen
    localStorage.setItem(HAS_SEEN_KEY, '1');
  }

  // Start peek after page settles
  setTimeout(peek, 1800);
})();

</script>
